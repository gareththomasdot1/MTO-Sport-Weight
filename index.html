<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REGC Performance PWA v2.6</title>
    <style>
        :root { --airbus-cyan: #00f2ff; --airbus-green: #00ff00; --airbus-magenta: #ff00ff; --airbus-amber: #ff9900; --airbus-red: #ff3333; --bg-dark: #0b0e14; --panel-bg: rgba(26, 31, 38, 0.95); --sidebar-bg: #15191f; }
        body, html { margin: 0; background: var(--bg-dark); color: #e0e0e0; font-family: monospace; height: 100dvh; overflow: hidden; }
        .dashboard { display: flex; flex-direction: column; height: 100%; }
        header { height: 45px; background: #111; border-bottom: 2px solid #333; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
        .version-tag { color: var(--airbus-magenta); font-weight: bold; }
        .main-view { display: flex; flex: 1; gap: 5px; padding: 5px; overflow: hidden; }
        .panel-box { background: var(--panel-bg); border: 1px solid #444; border-radius: 4px; padding: 15px; flex: 1; position: relative; overflow-y: auto; }
        .label { position: absolute; top: 5px; left: 5px; color: var(--airbus-cyan); font-size: 0.6rem; border: 1px solid var(--airbus-cyan); padding: 1px 3px; }
        .form-group { margin-bottom: 12px; }
        input[type="range"] { width: 100%; accent-color: var(--airbus-cyan); }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 10px; }
        td { padding: 8px 4px; border-bottom: 1px solid #222; }
        .val-out { color: var(--airbus-green); font-weight: bold; }
        footer { height: 50px; background: #000; border-top: 2px solid var(--airbus-cyan); display: grid; grid-template-columns: repeat(4, 1fr); align-items: center; }
        .met-item { text-align: center; border-right: 1px solid #222; }
        .met-lbl { color: #888; font-size: 0.5rem; text-transform: uppercase; }
        .val { display: block; color: var(--airbus-green); font-weight: bold; }
        .sidebar { height: 100%; width: 0; position: fixed; z-index: 2000; top: 0; right: 0; background-color: var(--sidebar-bg); transition: 0.3s; padding-top: 20px; border-left: 1px solid #444; }
    </style>
</head>
<body>

<div id="mySidebar" class="sidebar">
    <div style="padding:20px">
        <h2>CONFIG</h2>
        <div class="form-group">Reg: <input type="text" id="aircraftReg" value="G-IROI"></div>
        <div class="form-group">Empty Wt: <input type="number" id="emptyWeight" value="275"></div>
        <button onclick="saveAndClose()">SAVE</button>
    </div>
</div>

<div class="dashboard">
    <header>
        <div style="font-weight:bold;">FLIGHT PERFORMANCE v2.3</div>
        <div><span class="version-tag">v2.3</span> <button onclick="document.getElementById('mySidebar').style.width='250px'">&#9881;</button></div>
    </header>

    <div class="main-view">
        <div class="panel-box">
            <div class="label">INPUTS</div>
            <br>
            <div class="form-group">Pilot: <span id="val-pilot">90</span>kg <input type="range" id="pilotSlider" min="0" max="150" value="90" oninput="sync('pilot')"></div>
            <div class="form-group">Pax: <span id="val-passenger">0</span>kg <input type="range" id="passengerSlider" min="0" max="150" value="0" oninput="sync('passenger')"></div>
            <div class="form-group">Fuel: <span id="val-fuel">40</span>L <input type="range" id="fuelSlider" min="0" max="100" value="40" oninput="sync('fuel')"></div>
            <div class="form-group">Bag: <span id="val-baggage">5</span>kg <input type="range" id="baggageSlider" min="0" max="50" value="5" oninput="sync('baggage')"></div>
        </div>
        <div class="panel-box">
            <div class="label">MATRIX</div>
            <table>
                <tr><td>AUW</td><td id="outTotalWeight" class="val-out">--</td></tr>
                <tr><td>DENSITY ALT</td><td id="outDensityAlt" class="val-out">--</td></tr>
                <tr><td>ADVISORY</td><td id="outStatus" class="val-out">--</td></tr>
            </table>
            <div id="api-debug" style="font-size:0.6rem; color:#444; margin-top:20px;">API: WAITING...</div>
        </div>
    </div>

    <footer>
        <div class="met-item"><div class="met-lbl">WIND</div><span id="headwind-val" class="val">--</span></div>
        <div class="met-item"><div class="met-lbl">TODR</div><span id="todr-val" class="val">--</span></div>
        <div class="met-item"><div class="met-lbl">RWY</div><span id="rwy" class="val">23</span></div>
        <div class="met-item"><div class="met-lbl">API</div><span id="met-sync-status" class="val">--</span></div>
    </footer>
</div>

<script>
const airfield = { lat: 53.949, lon: -1.187, elev: 50 };

function sync(type) {
    document.getElementById('val-' + type).innerText = document.getElementById(type + 'Slider').value;
    calculateFlightSafety();
}

function saveAndClose() {
    document.getElementById('mySidebar').style.width = '0';
    calculateFlightSafety();
}

async function fetchLiveWeather() {
    const statusEl = document.getElementById('met-sync-status');
    const debugEl = document.getElementById('api-debug');
    try {
        const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${airfield.lat}&longitude=${airfield.lon}&current=temperature_2m,surface_pressure&wind_speed_unit=kn`);
        const data = await response.json();
        window.metData = data.current;
        debugEl.innerText = `T: ${window.metData.temperature_2m}°C | P: ${window.metData.surface_pressure}hPa`;
        statusEl.innerText = "ONLINE";
        calculateFlightSafety();
    } catch (e) {
        statusEl.innerText = "OFFLINE";
        calculateFlightSafety();
    }
}

function calculateFlightSafety() {
    const pW = parseInt(document.getElementById('pilotSlider').value);
    const paW = parseInt(document.getElementById('passengerSlider').value);
    const fL = parseInt(document.getElementById('fuelSlider').value);
    const bW = parseInt(document.getElementById('baggageSlider').value);
    const emptyW = parseInt(document.getElementById('emptyWeight').value) || 275;
    
    const auw = emptyW + pW + paW + bW + (fL * 0.72);
    const temp = window.metData ? window.metData.temperature_2m : 15;
    const qnh = window.metData ? window.metData.surface_pressure : 1013;
    const da = Math.round((airfield.elev + (1013 - qnh) * 30) + (120 * (temp - 15)));
    
    document.getElementById('outTotalWeight').innerText = Math.round(auw) + " kg";
    document.getElementById('outDensityAlt').innerText = da + " ft";
    document.getElementById('todr-val').innerText = Math.round(200 * (auw/450)) + " m";
    document.getElementById('outStatus').innerText = (auw > 450) ? "OVERWEIGHT" : "SAFE";
}

window.onload = fetchLiveWeather;
</script>
</body>
</html>
