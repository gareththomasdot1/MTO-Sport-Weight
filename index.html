<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aircraft Performance & Airfield Calculator 4.1</title>
    <style>
        :root {
            --airbus-cyan: #00f2ff;
            --airbus-green: #00ff00;
            --airbus-magenta: #ff00ff;
            --airbus-amber: #ff9900;
            --airbus-red: #ff3333;
            --bg-dark: #0b0e14;
            --panel-bg: rgba(26, 31, 38, 0.95);
            --btn-active: #343d4a;
            --sidebar-bg: #15191f;
        }

        body, html { margin: 0; padding: 0; background: var(--bg-dark); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; height: 100%; height: 100dvh; width: 100vw; overflow: hidden; }
        .dashboard { display: flex; flex-direction: column; height: 100%; width: 100%; }

        header { height: 45px; background: #111; border-bottom: 2px solid #333; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; flex-shrink: 0; }
        .app-title { font-weight: bold; color: #fff; font-size: 0.9rem; letter-spacing: 0.5px; }
        .icon-btn { background: transparent; border: none; color: #666; cursor: pointer; font-size: 1.2rem; }
        .icon-btn:hover { color: var(--airbus-cyan); }

        .sidebar { height: 100%; width: 0; position: fixed; z-index: 2000; top: 0; right: 0; background-color: var(--sidebar-bg); overflow-x: hidden; overflow-y: auto; transition: 0.3s; border-left: 1px solid #444; padding-top: 20px; }
        .sidebar-content { padding: 20px; width: 100%; box-sizing: border-box; }
        .closebtn { position: absolute; top: 10px; right: 20px; font-size: 2rem; color: #888; text-decoration: none; }
        
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; color: #aaa; font-size: 0.7rem; margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        input, select { width: 100%; background: #000; color: var(--airbus-green); border: 1px solid #444; padding: 8px; font-family: monospace; font-size: 0.9rem; box-sizing: border-box; border-radius: 4px; margin-bottom: 5px; }
        
        .main-view { display: flex; flex: 1; min-height: 0; gap: 5px; padding: 5px; overflow: hidden; }
        .panel-box { background: black; border: 1px solid #444; position: relative; border-radius: 4px; display: flex; flex-direction: column; padding: 15px; overflow-y: auto; flex: 1; }
        .label { position: absolute; top: 5px; left: 5px; background: rgba(0,0,0,0.8); color: var(--airbus-cyan); padding: 2px 5px; font-size: 0.6rem; border: 1px solid var(--airbus-cyan); font-family: monospace; }
        
        .btn-action { width: 100%; padding: 12px; background: #1a1f26; color: var(--airbus-cyan); border: 1px solid #444; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .status-ok { color: var(--airbus-green); }
        .status-not-ok { color: var(--airbus-red); }
        
        footer { height: 50px; background: #000; border-top: 2px solid var(--airbus-cyan); display: grid; grid-template-columns: repeat(4, 1fr); align-items: center; }
        .met-item { text-align: center; border-right: 1px solid #222; }
        .val { display: block; color: var(--airbus-green); font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

<div id="mySidebar" class="sidebar">
    <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
    <div class="sidebar-content">
        <h2>SYSTEM CONFIG</h2>
        <div class="form-group">
            <span class="form-label">Aircraft Profile (POH Data)</span>
            <input type="number" id="pohBaseRoll" placeholder="Base Takeoff Roll (m)">
            <input type="number" id="pohEngineHP" placeholder="Engine Power (HP)">
        </div>
        <div class="form-group">
            <span class="form-label">Aircraft Masses (kg)</span>
            <input type="number" id="emptyWeight" placeholder="Empty Basic Weight">
            <input type="number" id="maxWeight" placeholder="MTOW (Max Takeoff Weight)">
        </div>
        <div class="form-group">
            <span class="form-label">Payload Limits (kg)</span>
            <input type="number" id="pilotMin" placeholder="Pilot Min">
            <input type="number" id="pilotMax" placeholder="Pilot Max">
        </div>
        <button class="btn-action" onclick="saveConfiguration()">SAVE & APPLY</button>
    </div>
</div>

<div id="main" class="dashboard">
    <header>
        <div class="app-title">PERFORMANCE CALCULATOR v4.2</div>
        <button class="icon-btn" onclick="openNav()">&#9881;</button>
    </header>

    <div class="main-view">
        <div class="panel-box">
            <div class="label">INPUTS</div>
            <div class="form-group">
                <span class="form-label">Airfield</span>
                <select id="airfieldSelect" onchange="calculateFlightSafety()"></select>
            </div>
            <div class="form-group">
                <span class="form-label">Pilot Weight (kg)</span>
                <input type="number" id="pilotWeight" value="80" oninput="calculateFlightSafety()">
            </div>
            <div class="form-group">
                <span class="form-label">Passenger Weight (kg)</span>
                <input type="number" id="passengerWeight" value="0" oninput="calculateFlightSafety()">
            </div>
            <div class="form-group">
                <span class="form-label">Fuel (kg)</span>
                <input type="number" id="fuelLoad" value="30" oninput="calculateFlightSafety()">
            </div>
            <button class="btn-action" onclick="calculateFlightSafety()">RECOMPUTE (FETCH WEATHER)</button>
        </div>

        <div class="panel-box">
            <div class="label">RESULTS</div>
            <table style="width:100%; font-size:0.8rem; margin-top:20px;">
                <tr><td>Total Weight:</td><td id="outWeight" style="text-align:right">--</td></tr>
                <tr><td>Req Runway:</td><td id="outRunway" style="text-align:right">--</td></tr>
                <tr><td>Status:</td><td id="outStatus" style="text-align:right">--</td></tr>
            </table>
        </div>
    </div>

    <footer>
        <div class="met-item"><span class="form-label">DENS ALT</span><span id="dens-val" class="val">--</span></div>
        <div class="met-item"><span class="form-label">OAT / QNH</span><span id="met-val" class="val">--</span></div>
        <div class="met-item"><span class="form-label">STATUS</span><span id="stat-val" class="val">--</span></div>
        <div class="met-item"><span class="form-label">RWY</span><span id="rwy-val" class="val">--</span></div>
    </footer>
</div>

<script>
const airfieldDatabase = { 
    "EGXU": { name: "Rufforth", lat: 53.953, lon: -1.166, elev: 16, runways: ["05", "23"] },
    "EGBX": { name: "Woburn", lat: 51.989, lon: -0.618, elev: 95, runways: ["12", "30"] }
};

function openNav() { document.getElementById("mySidebar").style.width = "350px"; }
function closeNav() { document.getElementById("mySidebar").style.width = "0"; }

function init() {
    const select = document.getElementById('airfieldSelect');
    for(let code in airfieldDatabase) {
        let opt = document.createElement('option');
        opt.value = code; opt.innerHTML = airfieldDatabase[code].name;
        select.appendChild(opt);
    }
    loadConfig();
}

function loadConfig() {
    const saved = localStorage.getItem('aircraftConfig');
    const c = saved ? JSON.parse(saved) : { baseRoll: 150, hp: 115, emptyWeight: 260, maxWeight: 500, pilotMin: 60, pilotMax: 125 };
    document.getElementById('pohBaseRoll').value = c.baseRoll;
    document.getElementById('pohEngineHP').value = c.hp;
    document.getElementById('emptyWeight').value = c.emptyWeight;
    document.getElementById('maxWeight').value = c.maxWeight;
    document.getElementById('pilotMin').value = c.pilotMin;
    document.getElementById('pilotMax').value = c.pilotMax;
    calculateFlightSafety();
}

function saveConfiguration() {
    const config = {
        baseRoll: parseFloat(document.getElementById('pohBaseRoll').value),
        hp: parseFloat(document.getElementById('pohEngineHP').value),
        emptyWeight: parseFloat(document.getElementById('emptyWeight').value),
        maxWeight: parseFloat(document.getElementById('maxWeight').value),
        pilotMin: parseFloat(document.getElementById('pilotMin').value),
        pilotMax: parseFloat(document.getElementById('pilotMax').value)
    };
    localStorage.setItem('aircraftConfig', JSON.stringify(config));
    closeNav();
    calculateFlightSafety();
}

async function calculateFlightSafety() {
    const saved = localStorage.getItem('aircraftConfig');
    const c = saved ? JSON.parse(saved) : { baseRoll: 150, emptyWeight: 260, maxWeight: 500 };
    
    // UI Elements
    const pilot = parseFloat(document.getElementById('pilotWeight').value) || 0;
    const pax = parseFloat(document.getElementById('passengerWeight').value) || 0;
    const fuel = parseFloat(document.getElementById('fuelLoad').value) || 0;
    const totalWeight = c.emptyWeight + pilot + pax + fuel;
    
    document.getElementById('outWeight').innerText = totalWeight + " kg";
    
    // Live Weather Fetch
    const code = document.getElementById('airfieldSelect').value;
    const airfield = airfieldDatabase[code];
    let densityAlt = airfield.elev * 3.28; // Fallback
    
    try {
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${airfield.lat}&longitude=${airfield.lon}&current=temperature_2m,surface_pressure&wind_speed_unit=kn`);
        const w = await res.json();
        const temp = w.current.temperature_2m;
        const qnh = w.current.surface_pressure;
        // Simple Density Alt formula: Elevation + (120 * (OAT - ISA))
        densityAlt = Math.round((airfield.elev * 3.28) + (120 * (temp - 15)));
        document.getElementById('met-val').innerText = temp + "°C / " + Math.round(qnh) + "hPa";
    } catch(e) {
        document.getElementById('met-val').innerText = "API ERR";
    }
    
    document.getElementById('dens-val').innerText = densityAlt + " ft";

    // POH Calc: Weight factor + Density Alt penalty
    const weightFactor = (totalWeight / c.emptyWeight);
    const daPenalty = 1 + (Math.max(0, densityAlt) / 10000);
    const reqRoll = Math.round(c.baseRoll * weightFactor * daPenalty * 1.3);
    
    document.getElementById('outRunway').innerText = reqRoll + " m";
    
    const isOk = totalWeight <= c.maxWeight;
    document.getElementById('outStatus').innerHTML = isOk ? '<span class="status-ok">OK</span>' : '<span class="status-not-ok">LIMIT</span>';
    document.getElementById('stat-val').innerText = isOk ? "SAFE" : "FAIL";
    document.getElementById('rwy-val').innerText = airfield.runways[0];
}

window.onload = init;
</script>
</body>
</html>
