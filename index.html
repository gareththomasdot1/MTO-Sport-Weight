<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REGC Performance PWA</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0b0e14">
    <link rel="manifest" href="data:application/json;base64,ewogICJub21lIjogIlJFR0MgUGVyZm9ybWFuY2UiLAogICJzaG9ydF9uYW1lIjogIlJFR0MgQ2FsYyIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMGIwZTE0IiwKICAidGhlbWVfY29sb3IiOiAiIzBiMGUxNCIsCiAgIm9yaWVudGF0aW9uIjogImxhbmRzY2FwZSIKfQ==">

    <style>
        :root { --airbus-cyan: #00f2ff; --airbus-green: #00ff00; --airbus-magenta: #ff00ff; --airbus-amber: #ff9900; --airbus-red: #ff3333; --bg-dark: #0b0e14; --panel-bg: rgba(26, 31, 38, 0.95); --btn-active: #343d4a; --sidebar-bg: #15191f; }
        body, html { margin: 0; padding: 0; background: var(--bg-dark); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; height: 100%; height: 100dvh; width: 100vw; overflow: hidden; }
        .dashboard { display: flex; flex-direction: column; height: 100%; width: 100%; }
        #rotate-msg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        @media (orientation: portrait) { #rotate-msg { display: flex; } .dashboard { display: none; } }
        header { height: 45px; background: #111; border-bottom: 2px solid #333; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; flex-shrink: 0; }
        .app-title { font-weight: bold; color: #fff; font-size: 0.9rem; }
        .sidebar { height: 100%; width: 0; position: fixed; z-index: 2000; top: 0; right: 0; background-color: var(--sidebar-bg); overflow-x: hidden; overflow-y: auto; transition: 0.3s; border-left: 1px solid #444; padding-top: 20px; }
        .sidebar-content { padding: 20px; width: 100%; box-sizing: border-box; }
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; color: #aaa; font-size: 0.8rem; margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        input { width: 100%; background: #000; color: var(--airbus-green); border: 1px solid #444; padding: 8px; box-sizing: border-box; border-radius: 4px; }
        input[type="range"] { accent-color: var(--airbus-cyan); cursor: pointer; }
        .slider-container { display: flex; align-items: center; gap: 10px; }
        .btn-save, .btn-action { width: 100%; padding: 12px; background: #1a1f26; color: var(--airbus-cyan); border: 1px solid #444; cursor: pointer; font-weight: bold; border-radius: 4px; }
        .main-view { display: flex; flex: 1 1 auto; gap: 5px; padding: 5px; overflow: hidden; }
        .panel-box { background: black; border: 1px solid #444; position: relative; border-radius: 4px; padding: 15px; overflow-y: auto; flex: 1; }
        .label { position: absolute; top: 5px; left: 5px; color: var(--airbus-cyan); padding: 2px 5px; font-size: 0.6rem; border: 1px solid var(--airbus-cyan); }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 15px; }
        td { padding: 8px; border-bottom: 1px solid #222; }
        .val-out { color: var(--airbus-green); font-weight: bold; }
        footer { height: 50px; background: #000; border-top: 2px solid var(--airbus-cyan); display: grid; grid-template-columns: repeat(4, 1fr); }
        .met-item { text-align: center; border-right: 1px solid #222; display: flex; flex-direction: column; justify-content: center; }
        .val { color: var(--airbus-green); font-weight: bold; }
        .status-ok { color: var(--airbus-green); }
        .status-marginal { color: var(--airbus-amber); }
        .status-not-ok { color: var(--airbus-red); }
    </style>
</head>
<body>

<div id="rotate-msg"><h1>ROTATE DEVICE</h1><p>Use landscape for optimal viewing.</p></div>

<div id="mySidebar" class="sidebar">
    <div class="sidebar-content">
        <h2>SYSTEM CONFIG</h2>
        <div class="form-group"><span class="form-label">Registration</span><input type="text" id="aircraftReg" value="G-IROI"></div>
        <div class="form-group"><span class="form-label">Home Airfield (ICAO)</span><input type="text" id="homeAirfield" value="EGXU"></div>
        <div class="form-group"><span class="form-label">Empty Wt (kg)</span><input type="number" id="emptyWeight" value="275"></div>
        <button class="btn-save" onclick="saveConfiguration()">SAVE & APPLY</button>
    </div>
</div>

<div id="main" class="dashboard">
    <header>
        <div class="app-title">FLIGHT PERFORMANCE MANAGEMENT SYSTEM</div>
        <button onclick="document.getElementById('mySidebar').style.width='350px'">&#9881;</button>
    </header>

    <div class="main-view">
        <div class="panel-box">
            <div class="label">LOADING</div>
            <div class="form-group">Pilot: <span id="val-pilot">90kg</span> <input type="range" id="pilotSlider" min="0" max="150" value="90" oninput="sync('pilot', this.value)"></div>
            <div class="form-group">Pax: <span id="val-passenger">0kg</span> <input type="range" id="passengerSlider" min="0" max="150" value="0" oninput="sync('passenger', this.value)"></div>
            <button class="btn-action" onclick="calculateFlightSafety()">COMPUTE STATUS</button>
        </div>
        <div class="panel-box">
            <div class="label">MATRIX</div>
            <table>
                <tr><td>AUW</td><td id="outTotalWeight" class="val-out">--</td><td id="stat-weight">--</td></tr>
                <tr><td>DENSITY ALT</td><td id="outDA" class="val-out">--</td><td>--</td></tr>
                <tr><td>SAFETY</td><td id="outStatus" class="val-out">--</td><td id="stat-overall">--</td></tr>
            </table>
        </div>
    </div>

    <footer>
        <div class="met-item"><div style="font-size:0.5rem">WIND</div><span id="met-wind" class="val">--</span></div>
        <div class="met-item"><div style="font-size:0.5rem">TODR</div><span id="met-todr" class="val">--</span></div>
        <div class="met-item"><div style="font-size:0.5rem">API</div><span id="met-sync" class="val">--</span></div>
        <div class="met-item"><div style="font-size:0.5rem">STATUS</div><span id="met-cond" class="val">--</span></div>
    </footer>
</div>

<script>
const airfield = { lat: 53.949, lon: -1.187, elev: 50 };

async function fetchWeather() {
    try {
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${airfield.lat}&longitude=${airfield.lon}&current=temperature_2m,surface_pressure,wind_speed_10m&wind_speed_unit=kn`);
        const data = await res.json();
        window.met = data.current;
        document.getElementById('met-sync').innerText = "ONLINE";
        document.getElementById('met-wind').innerText = Math.round(window.met.wind_speed_10m) + " KT";
        calculateFlightSafety();
    } catch { document.getElementById('met-sync').innerText = "OFFLINE"; }
}

function sync(type, val) {
    document.getElementById('val-' + type).innerText = val + "kg";
    calculateFlightSafety();
}

function saveConfiguration() {
    const cfg = { reg: document.getElementById('aircraftReg').value, home: document.getElementById('homeAirfield').value, empty: parseFloat(document.getElementById('emptyWeight').value) };
    localStorage.setItem('cfg', JSON.stringify(cfg));
    document.getElementById('mySidebar').style.width = "0";
}

function calculateFlightSafety() {
    const cfg = JSON.parse(localStorage.getItem('cfg')) || { empty: 275 };
    const pW = parseInt(document.getElementById('pilotSlider').value);
    const paW = parseInt(document.getElementById('passengerSlider').value);
    const auw = cfg.empty + pW + paW;
    
    const temp = window.met ? window.met.temperature_2m : 15;
    const qnh = window.met ? window.met.surface_pressure : 1013;
    const da = Math.round((airfield.elev + (1013 - qnh) * 30) + (120 * (temp - 15)));
    
    document.getElementById('outTotalWeight').innerText = auw + " kg";
    document.getElementById('outDA').innerText = da + " ft";
    document.getElementById('met-todr').innerText = Math.round(200 * (auw/450)) + " m";
    
    const status = auw > 450 ? "FAIL" : "OK";
    document.getElementById('outStatus').innerText = status === "OK" ? "SAFE" : "OVERWEIGHT";
    document.getElementById('stat-overall').className = status === "OK" ? "status-ok" : "status-not-ok";
}

window.onload = () => { fetchWeather(); calculateFlightSafety(); };
</script>
</body>
</html>
