<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviation Performance & Weather Matrix</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 1.5rem;
            margin-top: 0;
            color: #fff;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #aaa;
        }
        .input-row {
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 4px;
            color: #fff;
            font-size: 1rem;
            text-transform: uppercase;
        }
        input[type="text"]:focus {
            border-color: #007acc;
            outline: none;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }
        .btn-primary {
            background-color: #007acc;
            color: #fff;
        }
        .btn-primary:hover {
            background-color: #0062a3;
        }
        .btn-secondary {
            background-color: #3a3a3a;
            color: #e0e0e0;
        }
        .btn-secondary:hover {
            background-color: #4a4a4a;
        }
        .output-box {
            margin-top: 20px;
            background: #151515;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 15px;
            min-height: 100px;
            white-space: pre-wrap;
            font-family: monospace;
            color: #a6e22e;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Airfield Performance Lookup</h1>
    
    <div class="form-group">
        <label for="airfieldInput">Airfield ICAO / Name</label>
        <div class="input-row">
            <input type="text" id="airfieldInput" placeholder="e.g. EGXU" autocomplete="off">
            <button type="button" class="btn-secondary" id="homeBtn">Home Airfield</button>
            <button type="button" class="btn-primary" id="searchBtn">Search</button>
        </div>
    </div>

    <div class="output-box" id="matrixOutput">Results will appear here...</div>
</div>

<script>
    // Configuration Constants
    const HOME_AIRFIELD = "Rufforth East"; // Primary flying location home config

    // DOM Elements
    const airfieldInput = document.getElementById('airfieldInput');
    const homeBtn = document.getElementById('homeBtn');
    const searchBtn = document.getElementById('searchBtn');
    const matrixOutput = document.getElementById('matrixOutput');

    // Home Airfield Functionality
    function setHomeAirfield() {
        airfieldInput.value = HOME_AIRFIELD.toUpperCase();
        matrixOutput.textContent = `Selected home airfield: ${HOME_AIRFIELD}\nClick Search to retrieve data.`;
    }

    // Search Execution Function
    function performSearch() {
        const query = airfieldInput.value.trim();
        
        if (!query) {
            matrixOutput.textContent = "Error: Please enter an airfield target or click 'Home Airfield'.";
            return;
        }

        matrixOutput.textContent = `Querying data for [${query.toUpperCase()}]...\n\n[Matrix Results Stub]\n- Temperature: ---\n- QNH: ---\n- Wind: ---\n- Density Altitude: ---`;
        
        // Dynamic fetch/calculation matrix logic will be integrated directly beneath here
    }

    // Event Listeners
    homeBtn.addEventListener('click', setHomeAirfield);
    searchBtn.addEventListener('click', performSearch);
    
    // Allow pressing enter inside the input box to trigger search
    airfieldInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            performSearch();
        }
    });

    // Run automatically on load to ensure Rufforth East is standard default fallback
    window.addEventListener('DOMContentLoaded', () => {
        setHomeAirfield();
    });
</script>

</body>
</html>
