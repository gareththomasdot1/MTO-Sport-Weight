<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REGC Performance v2.5</title>
    <style>
        :root { --airbus-cyan: #00f2ff; --airbus-green: #00ff00; --bg-dark: #0b0e14; }
        body { margin: 0; background: var(--bg-dark); color: #fff; font-family: monospace; height: 100dvh; overflow: hidden; }
        .dashboard { display: flex; flex-direction: column; height: 100%; }
        .panel { padding: 15px; border: 1px solid #444; margin: 5px; border-radius: 4px; }
        .val { color: var(--airbus-green); font-weight: bold; }
        input { background: #000; color: var(--airbus-green); border: 1px solid #444; }
        footer { display: grid; grid-template-columns: repeat(4, 1fr); text-align: center; border-top: 2px solid var(--airbus-cyan); padding: 10px 0; }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="panel">
        <h3>FLIGHT LOADING</h3>
        Pilot (kg): <input type="range" id="pilotSlider" min="0" max="150" value="90" oninput="calculateFlightSafety()">
        <span id="val-pilot">90</span><br>
        Pax (kg): <input type="range" id="passengerSlider" min="0" max="150" value="0" oninput="calculateFlightSafety()">
        <span id="val-passenger">0</span>
    </div>
    <div class="panel">
        <h3>COMPUTATION</h3>
        <div>AUW: <span id="outTotalWeight" class="val">--</span></div>
        <div>Density Alt: <span id="outDensityAlt" class="val">--</span></div>
        <div>API Data: <span id="api-debug" style="font-size: 0.7rem; color: #888;">WAITING...</span></div>
    </div>
    <footer id="footer">
        <div>WIND<br><span id="headwind-val" class="val">--</span></div>
        <div>TODR<br><span id="todr-val" class="val">--</span></div>
        <div>RWY<br><span id="rwy" class="val">--</span></div>
        <div>STATUS<br><span id="met-sync-status" class="val">--</span></div>
    </footer>
</div>

<script>
const airfield = { lat: 53.949, lon: -1.187, elev: 50, baseTodr: 200 };

async function fetchLiveWeather() {
    const statusEl = document.getElementById('met-sync-status');
    const debugEl = document.getElementById('api-debug');
    statusEl.innerText = "FETCHING";
    
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 5000);

    try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${airfield.lat}&longitude=${airfield.lon}&current=temperature_2m,surface_pressure,wind_speed_10m,wind_direction_10m&wind_speed_unit=kn`;
        const response = await fetch(url, { signal: controller.signal });
        clearTimeout(timeout);

        if (!response.ok) throw new Error("API Fail");
        
        const data = await response.json();
        const cur = data.current;
        
        // Save to window for calculation
        window.metData = cur;
        debugEl.innerText = `T: ${cur.temperature_2m}°C | P: ${cur.surface_pressure}hPa`;
        statusEl.innerText = "ONLINE";
        calculateFlightSafety();
    } catch (e) {
        statusEl.innerText = "OFFLINE";
        debugEl.innerText = "Using default values";
        calculateFlightSafety();
    }
}

function calculateFlightSafety() {
    const pilotW = parseInt(document.getElementById('pilotSlider').value);
    const passW = parseInt(document.getElementById('passengerSlider').value);
    document.getElementById('val-pilot').innerText = pilotW;
    document.getElementById('val-passenger').innerText = passW;

    // Use fetched data or defaults
    const temp = window.metData ? window.metData.temperature_2m : 15;
    const qnh = window.metData ? window.metData.surface_pressure : 1013;
    
    const auw = 275 + pilotW + passW;
    const densityAlt = Math.round((50 + (1013 - qnh) * 30) + (120 * (temp - 15)));
    
    document.getElementById('outTotalWeight').innerText = auw + " kg";
    document.getElementById('outDensityAlt').innerText = densityAlt + " ft";
    document.getElementById('todr-val').innerText = Math.round(airfield.baseTodr * (auw/450)) + " m";
    document.getElementById('rwy').innerText = "23";
}

window.onload = fetchLiveWeather;
</script>
</body>
</html>
